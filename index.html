
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <script>
        (function () {
          var params = new URLSearchParams(window.location.search);
          var redirectPath = params.get('p');

          if (!redirectPath) {
            return;
          }

          var restoredQuery = params.get('q');
          var nextUrl = '%BASE_URL%' + redirectPath.replace(/^\/+/, '');

          if (restoredQuery) {
            nextUrl += '?' + restoredQuery;
          }

          if (window.location.hash) {
            nextUrl += window.location.hash;
          }

          window.history.replaceState(null, '', nextUrl);
        })();
      </script>
      <title>Mohammed Faheem FS | Business Analyst Portfolio</title>
      <meta
        name="description"
        content="Portfolio for Mohammed Faheem FS focused on business analysis, UX thinking, requirement clarity, and SQL-backed problem solving."
      />
      <meta name="theme-color" content="#122033" />
      <meta property="og:type" content="website" />
      <meta property="og:title" content="Mohammed Faheem FS | Business Analyst Portfolio" />
      <meta
        property="og:description"
        content="Business analysis portfolio with concept case studies, clearer product thinking, and structured documentation."
      />
      <meta property="og:image" content="%BASE_URL%og-cover.svg" />
      <meta property="twitter:card" content="summary_large_image" />
      <meta property="twitter:title" content="Mohammed Faheem FS | Business Analyst Portfolio" />
      <meta
        property="twitter:description"
        content="Business analysis portfolio with concept case studies, clearer product thinking, and structured documentation."
      />
      <meta property="twitter:image" content="%BASE_URL%og-cover.svg" />
      <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    </head>

    </body>
  </html>
